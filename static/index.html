<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskTrack Free</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:#10151F; --surface:#171E2B; --surface-2:#1E2635; --border:#293145;
    --text:#E7E9EE; --muted:#8B93A7;
    --accent:#E8A33D; --accent-ink:#3A2A0E;
    --success:#4FAE7A; --danger:#D9534F; --info:#5B8DEF;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  ::selection{background:var(--accent);color:var(--accent-ink);}
  input,textarea,select{font-family:inherit;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 12px;width:100%;outline:none;}
  input:focus,textarea:focus,select:focus{border-color:var(--accent);}
  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{background:var(--accent);color:var(--accent-ink);font-weight:600;border-radius:8px;padding:10px 16px;}
  .btn:hover{filter:brightness(1.08);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:10px 16px;}
  .btn-ghost:hover{color:var(--text);border-color:var(--accent);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;}
  a{color:var(--accent);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useCallback } = React;

const STATUS_META = {
  pending:     { label: "Pending",     color: "var(--muted)" },
  in_progress: { label: "In progress", color: "var(--info)" },
  done:        { label: "Done",        color: "var(--success)" },
};

async function api(path, opts = {}) {
  const res = await fetch("/api" + path, {
    credentials: "include",
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  if (res.status === 204) return null;
  const data = await res.json().catch(() => null);
  if (!res.ok) throw new Error((data && data.detail) || "Something went wrong");
  return data;
}

function Logo() {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{
        width: 30, height: 30, borderRadius: 8, background: "var(--accent)",
        display: "flex", alignItems: "center", justifyContent: "center",
        color: "var(--accent-ink)", fontWeight: 700, fontFamily: "'Space Grotesk'"
      }}>T</div>
      <span className="display" style={{ fontWeight: 700, fontSize: 18 }}>TaskTrack</span>
      <span className="mono" style={{ color: "var(--muted)", fontSize: 11, border: "1px solid var(--border)", borderRadius: 999, padding: "2px 8px" }}>free</span>
    </div>
  );
}

function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("login");
  const [form, setForm] = useState({ name: "", email: "", password: "" });
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(""); setLoading(true);
    try {
      const body = mode === "login"
        ? { email: form.email, password: form.password }
        : form;
      const data = await api(`/auth/${mode === "login" ? "login" : "register"}`, {
        method: "POST", body: JSON.stringify(body),
      });
      onAuthed(data.user);
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div className="card" style={{ width: 380, padding: 32 }}>
        <Logo />
        <h1 style={{ fontSize: 22, margin: "20px 0 4px" }}>{mode === "login" ? "Sign in" : "Create your account"}</h1>
        <p style={{ color: "var(--muted)", fontSize: 14, margin: "0 0 20px" }}>
          {mode === "login" ? "Welcome back — pick up where the team left off." : "Join the team ledger in seconds."}
        </p>
        <form onSubmit={submit} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {mode === "register" && (
            <input placeholder="Full name" required value={form.name}
              onChange={e => setForm({ ...form, name: e.target.value })} />
          )}
          <input type="email" placeholder="Email" required value={form.email}
            onChange={e => setForm({ ...form, email: e.target.value })} />
          <input type="password" placeholder="Password" required minLength={6} value={form.password}
            onChange={e => setForm({ ...form, password: e.target.value })} />
          {error && <div style={{ color: "var(--danger)", fontSize: 13 }}>{error}</div>}
          <button className="btn" disabled={loading} style={{ marginTop: 4 }}>
            {loading ? "Please wait…" : mode === "login" ? "Sign in" : "Create account"}
          </button>
        </form>
        <div style={{ marginTop: 18, fontSize: 13, color: "var(--muted)", textAlign: "center" }}>
          {mode === "login" ? "New here?" : "Already have an account?"}{" "}
          <a href="#" onClick={e => { e.preventDefault(); setMode(mode === "login" ? "register" : "login"); setError(""); }}>
            {mode === "login" ? "Create one" : "Sign in"}
          </a>
        </div>
        <div style={{ marginTop: 16, fontSize: 12, color: "var(--muted)", borderTop: "1px solid var(--border)", paddingTop: 12 }}>
          Admin demo login: <span className="mono">admin@tasktrack.com</span> / <span className="mono">admin123</span>
        </div>
      </div>
    </div>
  );
}

function TaskCard({ task, onUpdate, onDelete }) {
  const meta = STATUS_META[task.status];
  return (
    <div className="card" style={{ padding: 14, marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
        <div style={{ fontWeight: 600 }}>{task.title}</div>
        <button onClick={() => onDelete(task.id)} title="Delete"
          style={{ background: "none", color: "var(--muted)", fontSize: 16, padding: "0 4px" }}>×</button>
      </div>
      {task.description && <div style={{ color: "var(--muted)", fontSize: 13, marginTop: 4 }}>{task.description}</div>}
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
        <select value={task.status} onChange={e => onUpdate(task.id, { status: e.target.value })}
          style={{ padding: "4px 8px", fontSize: 12, width: "auto" }}>
          {Object.entries(STATUS_META).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        {task.due_date && (
          <span className="mono" style={{ fontSize: 11, color: task.overdue ? "var(--danger)" : "var(--muted)" }}>
            due {task.due_date} {task.overdue ? "· overdue" : ""}
          </span>
        )}
      </div>
    </div>
  );
}

function NewTaskForm({ onCreate }) {
  const [open, setOpen] = useState(false);
  const [title, setTitle] = useState("");
  const [description, setDescription] = useState("");
  const [dueDate, setDueDate] = useState("");

  const submit = async (e) => {
    e.preventDefault();
    if (!title.trim()) return;
    await onCreate({ title, description, due_date: dueDate || null });
    setTitle(""); setDescription(""); setDueDate(""); setOpen(false);
  };

  if (!open) {
    return <button className="btn-ghost" style={{ width: "100%", marginBottom: 16 }} onClick={() => setOpen(true)}>+ New task</button>;
  }
  return (
    <form onSubmit={submit} className="card" style={{ padding: 14, marginBottom: 16, display: "flex", flexDirection: "column", gap: 8 }}>
      <input autoFocus placeholder="Task title" value={title} onChange={e => setTitle(e.target.value)} />
      <textarea placeholder="Description (optional)" rows={2} value={description} onChange={e => setDescription(e.target.value)} />
      <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} />
      <div style={{ display: "flex", gap: 8 }}>
        <button className="btn" type="submit">Add task</button>
        <button className="btn-ghost" type="button" onClick={() => setOpen(false)}>Cancel</button>
      </div>
    </form>
  );
}

function Dashboard({ user }) {
  const [tasks, setTasks] = useState([]);
  const [error, setError] = useState("");

  const load = useCallback(async () => {
    try { setTasks(await api("/tasks")); } catch (e) { setError(e.message); }
  }, []);
  useEffect(() => { load(); }, [load]);

  const createTask = async (body) => { await api("/tasks", { method: "POST", body: JSON.stringify(body) }); load(); };
  const updateTask = async (id, body) => { await api(`/tasks/${id}`, { method: "PUT", body: JSON.stringify(body) }); load(); };
  const deleteTask = async (id) => { await api(`/tasks/${id}`, { method: "DELETE" }); load(); };

  const columns = ["pending", "in_progress", "done"];

  return (
    <div>
      <h2 style={{ marginBottom: 4 }}>Your tasks</h2>
      <p style={{ color: "var(--muted)", fontSize: 14, marginTop: 0 }}>{user.name}'s personal board</p>
      {error && <div style={{ color: "var(--danger)", marginBottom: 12 }}>{error}</div>}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 20 }}>
        {columns.map(col => (
          <div key={col}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <span style={{ width: 8, height: 8, borderRadius: 999, background: STATUS_META[col].color, display: "inline-block" }}></span>
              <h3 style={{ margin: 0, fontSize: 14, color: "var(--muted)", textTransform: "uppercase", letterSpacing: 0.5 }}>
                {STATUS_META[col].label} · {tasks.filter(t => t.status === col).length}
              </h3>
            </div>
            {col === "pending" && <NewTaskForm onCreate={createTask} />}
            {tasks.filter(t => t.status === col).map(t => (
              <TaskCard key={t.id} task={t} onUpdate={updateTask} onDelete={deleteTask} />
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminPanel() {
  const [users, setUsers] = useState([]);
  const [error, setError] = useState("");

  const load = useCallback(async () => {
    try { setUsers(await api("/admin/users")); } catch (e) { setError(e.message); }
  }, []);
  useEffect(() => { load(); }, [load]);

  const removeUser = async (id) => {
    if (!confirm("Remove this teammate and all their tasks?")) return;
    await api(`/admin/users/${id}`, { method: "DELETE" });
    load();
  };

  return (
    <div>
      <h2 style={{ marginBottom: 4 }}>Team overview</h2>
      <p style={{ color: "var(--muted)", fontSize: 14, marginTop: 0 }}>Every teammate's completion stats, in one batched query.</p>
      {error && <div style={{ color: "var(--danger)", marginBottom: 12 }}>{error}</div>}
      <div className="card" style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ textAlign: "left", color: "var(--muted)", borderBottom: "1px solid var(--border)" }}>
              {["Name", "Email", "Total", "Done", "Pending", "In progress", "Overdue", "Completion", ""].map(h => (
                <th key={h} style={{ padding: "10px 14px", fontWeight: 500 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {users.map(u => (
              <tr key={u.id} style={{ borderBottom: "1px solid var(--border)" }}>
                <td style={{ padding: "10px 14px", fontWeight: 600 }}>{u.name} {u.role === "admin" && <span className="mono" style={{ color: "var(--accent)", fontSize: 11 }}> · admin</span>}</td>
                <td style={{ padding: "10px 14px", color: "var(--muted)" }}>{u.email}</td>
                <td className="mono" style={{ padding: "10px 14px" }}>{u.total}</td>
                <td className="mono" style={{ padding: "10px 14px", color: "var(--success)" }}>{u.done}</td>
                <td className="mono" style={{ padding: "10px 14px" }}>{u.pending}</td>
                <td className="mono" style={{ padding: "10px 14px", color: "var(--info)" }}>{u.in_progress}</td>
                <td className="mono" style={{ padding: "10px 14px", color: u.overdue ? "var(--danger)" : "var(--muted)" }}>{u.overdue}</td>
                <td className="mono" style={{ padding: "10px 14px" }}>{u.completion_rate}%</td>
                <td style={{ padding: "10px 14px" }}>
                  {u.role !== "admin" && (
                    <button className="btn-ghost" style={{ padding: "4px 10px", fontSize: 12 }} onClick={() => removeUser(u.id)}>Remove</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(undefined); // undefined = loading, null = logged out
  const [view, setView] = useState("tasks");

  useEffect(() => {
    api("/auth/me").then(setUser).catch(() => setUser(null));
  }, []);

  const logout = async () => { await api("/auth/logout", { method: "POST" }); setUser(null); };

  if (user === undefined) return null;
  if (!user) return <AuthScreen onAuthed={setUser} />;

  return (
    <div>
      <div style={{ borderBottom: "1px solid var(--border)", padding: "14px 24px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <Logo />
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          {user.role === "admin" && (
            <div style={{ display: "flex", gap: 4, background: "var(--surface-2)", borderRadius: 8, padding: 4 }}>
              <button onClick={() => setView("tasks")} className={view === "tasks" ? "btn" : "btn-ghost"} style={{ padding: "6px 12px", fontSize: 13, border: "none" }}>My tasks</button>
              <button onClick={() => setView("admin")} className={view === "admin" ? "btn" : "btn-ghost"} style={{ padding: "6px 12px", fontSize: 13, border: "none" }}>Team</button>
            </div>
          )}
          <span style={{ color: "var(--muted)", fontSize: 14 }}>{user.name}</span>
          <button className="btn-ghost" onClick={logout} style={{ padding: "6px 12px", fontSize: 13 }}>Sign out</button>
        </div>
      </div>
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "28px 24px" }}>
        {view === "admin" && user.role === "admin" ? <AdminPanel /> : <Dashboard user={user} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
